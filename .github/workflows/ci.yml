name: CI Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run API tests
        run: mvn -B test -Dtest="api.tests.**"

      - name: Generate Allure report
        if: always()
        run: mvn -B allure:report

      - name: Upload Allure results (API)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: target/allure-results
          retention-days: 14

      - name: Upload Allure HTML report (API)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-api
          path: target/site/allure-maven-plugin
          retention-days: 14

  ui-tests:
    name: UI Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Install Playwright Chromium
        run: mvn -B exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps chromium"

      - name: Run UI tests
        run: mvn -B test -Dtest="ui.tests.**"
        env:
          CI: true

      - name: Generate Allure report
        if: always()
        run: mvn -B allure:report

      - name: Upload Allure results (UI)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui
          path: target/allure-results
          retention-days: 14

      - name: Upload Allure HTML report (UI)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-ui
          path: target/site/allure-maven-plugin
          retention-days: 14

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-ui
          path: target/screenshots
          retention-days: 14
          if-no-files-found: ignore
